name: Build Job Syria APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix Package Name from Firebase
        run: |
          node -e '
            const fs = require("fs");
            const gs = JSON.parse(fs.readFileSync("google-services.json", "utf8"));
            const pkg = gs.client[0].client_info.android_client_info.package_name;
            const configPath = "capacitor.config.json";
            const config = JSON.parse(fs.readFileSync(configPath, "utf8"));
            config.appId = pkg;
            fs.writeFileSync(configPath, JSON.stringify(config, null, 2));
          '

      - name: Generate Clean Android Project
        run: |
          rm -rf android
          npx cap add android

      - name: Generate App Icons
        run: |
          npx cap migrate assets || true
          npx @capacitor/assets generate --android || true

      - name: Sync Project & Copy Assets
        run: |
          npx cap copy android
          npx cap sync android

      - name: Copy Firebase Google Services
        run: |
          mkdir -p android/app
          cp google-services.json android/app/google-services.json

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: JobSyria-App-Release
          path: android/app/build/outputs/apk/debug/app-debug.apk
