name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Prepare Web Directory & Install Dependencies
      run: |
        mkdir -p www
        cp index.html manifest.json sw.js icon-192.png icon-512.png www/ 2>/dev/null || true
        
        npm init -y
        npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5 @capacitor/push-notifications@5
        
        # استخدام اسم الحزمة المطابق تماماً لملف الفايربيس
        npx cap init "Job Syria" "com.job.syria" --web-dir www
        npx cap add android

    - name: Setup Firebase Config
      run: |
        if [ -f "google-services.json" ]; then
          cp google-services.json android/app/google-services.json
          
          # ربط مكونات الفايربيس بمشروع الأندرويد
          sed -i "/dependencies {/a \        classpath 'com.google.gms:google-services:4.4.0'" android/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
        fi

    - name: Setup Android Icons
      run: |
        ICON_SRC="icon-512.png"
        [ -f "$ICON_SRC" ] || ICON_SRC="icon-192.png"

        RES_PATH="android/app/src/main/res"

        cp "$ICON_SRC" "$RES_PATH/mipmap-hdpi/ic_launcher.png" 2>/dev/null || true
        cp "$ICON_SRC" "$RES_PATH/mipmap-mdpi/ic_launcher.png" 2>/dev/null || true
        cp "$ICON_SRC" "$RES_PATH/mipmap-xhdpi/ic_launcher.png" 2>/dev/null || true
        cp "$ICON_SRC" "$RES_PATH/mipmap-xxhdpi/ic_launcher.png" 2>/dev/null || true
        cp "$ICON_SRC" "$RES_PATH/mipmap-xxxhdpi/ic_launcher.png" 2>/dev/null || true

    - name: Add Permissions to AndroidManifest
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.VIBRATE" \/>' $MANIFEST_PATH

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Sync & Build Android
      run: |
        npx cap sync android
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: JobSyria-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
