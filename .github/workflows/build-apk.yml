name: Build Job Syria APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract Package Name from Firebase
        id: get_pkg
        run: |
          PKG_NAME=$(jq -r '.client[0].client_info.android_client_info.package_name' google-services.json)
          echo "PACKAGE_NAME=$PKG_NAME" >> $GITHUB_ENV
          echo "Detected Package Name: $PKG_NAME"

      - name: Generate Clean Android Project & Sync
        run: |
          rm -rf android
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Inject Package Name to Capacitor Config
        run: |
          npx cap config set appId "${{ env.PACKAGE_NAME }}"
          npx cap sync android

      - name: Copy Firebase Google Services
        run: |
          mkdir -p android/app
          cp google-services.json android/app/google-services.json

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: JobSyria-App-Release
          path: android/app/build/outputs/apk/debug/app-debug.apk
