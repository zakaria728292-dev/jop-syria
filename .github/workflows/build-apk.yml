name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Prepare Web Directory & Install Dependencies
      run: |
        mkdir -p www
        cp index.html manifest.json sw.js icon-192.png icon-512.png www/ 2>/dev/null || true
        npm init -y
        npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5
        npx cap init "Job Syria" "com.jobsyria.app" --web-dir www
        npx cap add android

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Sync & Build Android
      run: |
        npx cap copy
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: JobSyria-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
