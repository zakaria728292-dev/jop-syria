name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Prepare Android Project & Assets
      run: |
        # 1. حذف مجلد android القديم إن وجد لضمان إنشائه بملفات gradlew كاملة
        rm -rf android

        # 2. إنشاء مشروع أندرويد جديد ونظيف ومكتمل
        npx cap add android

        # 3. التأكد من وضع ملف google-services.json في مجلد android/app
        mkdir -p android/app
        FOUND_FILE=$(find . -maxdepth 3 -name "google-services.json" | head -n 1)
        if [ -n "$FOUND_FILE" ] && [ "$FOUND_FILE" != "./android/app/google-services.json" ]; then
          cp "$FOUND_FILE" android/app/google-services.json
          echo "Copied google-services.json from $FOUND_FILE"
        fi

        # 4. توليد الأيقونات تلقائياً
        npx @capacitor/assets generate --iconAvailableSource www/icon-192.png || true

        # 5. مزامنة الملفات مع أندرويد
        npx cap sync android

    - name: Inject Firebase Gradle & Permissions
      run: |
        BUILD_GRADLE="android/build.gradle"
        APP_BUILD_GRADLE="android/app/build.gradle"
        MANIFEST="android/app/src/main/AndroidManifest.xml"

        # إضافة كلاس Firebase في build.gradle الرئيسي
        if [ -f "$BUILD_GRADLE" ]; then
          if ! grep -q "com.google.gms:google-services" "$BUILD_GRADLE"; then
            sed -i '/dependencies {/a \        classpath "com.google.gms:google-services:4.3.15"' "$BUILD_GRADLE"
          fi
        fi

        # تطبيق بلاجن Firebase في app/build.gradle
        if [ -f "$APP_BUILD_GRADLE" ]; then
          if ! grep -q "com.google.gms.google-services" "$APP_BUILD_GRADLE"; then
            echo 'apply plugin: "com.google.gms.google-services"' >> "$APP_BUILD_GRADLE"
          fi
        fi

        # إضافة إذن الإشعارات لأجهزة أندرويد الحديثة
        if [ -f "$MANIFEST" ]; then
          if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
            sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>' "$MANIFEST"
          fi
        fi

    - name: Set up Java JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
