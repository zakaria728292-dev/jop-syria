name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Prepare Android Project & Assets
      run: |
        # 1. إضافة أندرويد إن لم يكن موجوداً
        npx cap add android || true

        # 2. التأكد من وجود ملف google-services.json بذكاء بدون نسخ الملف على نفسه
        mkdir -p android/app
        if [ ! -f "android/app/google-services.json" ]; then
          FOUND_FILE=$(find . -name "google-services.json" | head -n 1)
          if [ -n "$FOUND_FILE" ]; then
            cp "$FOUND_FILE" android/app/google-services.json
            echo "Copied google-services.json from $FOUND_FILE"
          fi
        else
          echo "google-services.json is already in android/app/"
        fi

        # 3. توليد الأيقونات تلقائياً
        npx @capacitor/assets generate --iconAvailableSource www/icon-192.png || true

        # 4. مزامنة الملفات مع أندرويد
        npx cap sync android

    - name: Inject Firebase Gradle & Permissions
      run: |
        BUILD_GRADLE="android/build.gradle"
        if ! grep -q "com.google.gms:google-services" "$BUILD_GRADLE"; then
          sed -i '/dependencies {/a \        classpath "com.google.gms:google-services:4.3.15"' "$BUILD_GRADLE"
        fi

        APP_BUILD_GRADLE="android/app/build.gradle"
        if ! grep -q "com.google.gms.google-services" "$APP_BUILD_GRADLE"; then
          echo 'apply plugin: "com.google.gms.google-services"' >> "$APP_BUILD_GRADLE"
        fi

        MANIFEST="android/app/src/main/AndroidManifest.xml"
        if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>' "$MANIFEST"
        fi

    - name: Set up Java JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
