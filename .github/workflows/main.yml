name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Initialize Capacitor Android
        run: |
          npx cap add android

      - name: Inject Permissions and Copy Icons
        run: |
          # إضافة تصاريح الإشعارات إلى AndroidManifest.xml
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" \/>' $MANIFEST
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.VIBRATE" \/>' $MANIFEST
          
          # نسخ الأيقونة لتكون أيقونة التطبيق الرسمية
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp www/icon-512.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp www/icon-512.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp www/icon-512.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp www/icon-512.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp www/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp www/icon-512.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp www/icon-512.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp www/icon-512.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp www/icon-512.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp www/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobSyria-App-v1.0.1
          path: android/app/build/outputs/apk/debug/app-debug.apk
