name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: |
        npm install
        npm install -D @capacitor/assets

    - name: Prepare Assets & Android Platform
      run: |
        # 1. تجهيز مجلد assets وتوليد الأيقونات
        mkdir -p assets
        if [ -f "www/icon-192.png" ]; then
          cp www/icon-192.png assets/icon-only.png
          cp www/icon-192.png assets/icon-foreground.png
          cp www/icon-192.png assets/icon-background.png
        fi

        # 2. إزالة وإعادة إضافة مشروع أندرويد لإنشاء الأيقونات الأصلية
        rm -rf android
        npx cap add android

        # 3. توليد الأيقونات الرسمية لأندرويد
        npx @capacitor/assets generate --android || true

        # 4. نقل ملف Firebase
        mkdir -p android/app
        FOUND_FILE=$(find . -maxdepth 3 -name "google-services.json" | head -n 1)
        if [ -n "$FOUND_FILE" ] && [ "$FOUND_FILE" != "./android/app/google-services.json" ]; then
          cp "$FOUND_FILE" android/app/google-services.json
        fi

        # 5. مزامنة Capacitor
        npx cap sync android

    - name: Inject Firebase Gradle & Permissions & Services
      run: |
        BUILD_GRADLE="android/build.gradle"
        APP_BUILD_GRADLE="android/app/build.gradle"
        MANIFEST="android/app/src/main/AndroidManifest.xml"

        # إضافة بيلد جيردل الرئيسي
        if [ -f "$BUILD_GRADLE" ]; then
          if ! grep -q "com.google.gms:google-services" "$BUILD_GRADLE"; then
            sed -i '/dependencies {/a \        classpath "com.google.gms:google-services:4.3.15"' "$BUILD_GRADLE"
          fi
        fi

        # إضافة بلاجن الفايربيس
        if [ -f "$APP_BUILD_GRADLE" ]; then
          if ! grep -q "com.google.gms.google-services" "$APP_BUILD_GRADLE"; then
            echo 'apply plugin: "com.google.gms.google-services"' >> "$APP_BUILD_GRADLE"
          fi
        fi

        # إضافة التصاريح وخدمات Firebase لمنع الإغلاق المفاجئ (Crash)
        if [ -f "$MANIFEST" ]; then
          if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
            sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>' "$MANIFEST"
          fi

          # إضافة Firebase Messaging Service لمنع الـ Crash
          SERVICE_TAG='<service android:name="com.google.firebase.messaging.FirebaseMessagingService" android:exported="false"><intent-filter><action android:name="com.google.firebase.MESSAGING_EVENT"/></intent-filter></service>'
          if ! grep -q "FirebaseMessagingService" "$MANIFEST"; then
            sed -i "/<\/application>/i \        $SERVICE_TAG" "$MANIFEST"
          fi
        fi

    - name: Set up Java JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
