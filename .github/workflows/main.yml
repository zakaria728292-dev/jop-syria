name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Set up Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/android @capacitor/push-notifications

      - name: Build Web App & Add Android
        run: |
          npx cap add android || true
          
          # Copy google-services.json to android/app if present
          if [ -f "google-services.json" ]; then
            mkdir -p android/app
            cp google-services.json android/app/google-services.json
            echo "google-services.json copied to android/app!"
          fi

          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
