name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: |
        npm install
        npm install -D @capacitor/assets

    - name: Prepare Android Project & Assets
      run: |
        npx cap add android || true

        # 1. نقل ملف Firebase إلى مجلد أندرويد لحل مشكلة الإشعارات
        mkdir -p android/app
        cp google-services.json android/app/google-services.json

        # 2. توليد الأيقونات تلقائياً لحل مشكلة الأيقونة الافتراضية
        npx @capacitor/assets generate --iconAvailableSource icon-512.png || true

        # 3. مزامنة المشروع
        npx cap sync android

    - name: Inject Firebase Gradle & Permissions
      run: |
        # إضافة إعدادات Firebase في build.gradle
        BUILD_GRADLE="android/build.gradle"
        if ! grep -q "com.google.gms:google-services" "$BUILD_GRADLE"; then
          sed -i '/dependencies {/a \        classpath "com.google.gms:google-services:4.3.15"' "$BUILD_GRADLE"
        fi

        APP_BUILD_GRADLE="android/app/build.gradle"
        if ! grep -q "com.google.gms.google-services" "$APP_BUILD_GRADLE"; then
          echo 'apply plugin: "com.google.gms.google-services"' >> "$APP_BUILD_GRADLE"
        fi

        # إضافة إذن الإشعارات لأجهزة أندرويد الحديثة
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>' "$MANIFEST"
        fi

    - name: Set up Java JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
