Name: Build Android APK

On:
  Push:
    Branches:
      - main
  Workflow_dispatch:

Jobs:
  Build:
    Runs-on: ubuntu-latest

    Steps:
      - name: Checkout repository
        Uses: actions/checkout@v3

      - name: Set up Node.js
        Uses: actions/setup-node@v3
        With:
          Node-version: 18

      - name: Set up Java JDK 17
        Uses: actions/setup-java@v3
        With:
          Distribution: 'zulu'
          Java-version: '17'

      - name: Install dependencies
        Run: |
          Npm install
          Npm install @capacitor/core @capacitor/android @capacitor/push-notifications

      - name: Build Web App & Add Android
        Run: |
          # 1. تشغيل سكريبت البناء إن وجد في package.json لتجميع مكتبات Supabase والملفات
          Npm run build --if-present

          # 2. إضافة منصة الأندرويد إن لم تكن موجودة
          Npx cap add android || true
          
          # 3. نسخ ملف google-services.json إلى مجلد التطبيق
          If [ -f "google-services.json" ]; then
            Mkdir -p android/app
            Cp google-services.json android/app/google-services.json
            Echo "google-services.json copied to android/app!"
          Fi

          # 4. نسخ ملفات www وتهيئة الأندرويد بالكامل
          Npx cap copy android
          Npx cap sync android

      - name: Build Android APK
        Run: |
          Cd android
          Chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        Uses: actions/upload-artifact@v4
        With:
          Name: app-debug
          Path: android/app/build/outputs/apk/debug/app-debug.apk
