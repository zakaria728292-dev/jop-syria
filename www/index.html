<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Syria</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --gold: #d4af37;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --green: #28a745;
            --red: #dc3545;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0; padding: 0;
            user-select: none;
        }
        .hidden { display: none !important; }
        .page { padding: 15px; padding-bottom: 70px; }
        .admin-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }
        button {
            cursor: pointer;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            font-weight: bold;
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 14px;
        }
        .btn-broadcast {
            background-color: var(--red);
            color: white;
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-weight: bold;
        }
        .msg-user { font-weight: bold; color: var(--gold); }
        .msg-green { color: #34c759 !important; }
        .msg { background: #222; padding: 8px; border-radius: 6px; margin-bottom: 6px; }
        .chat-img { max-width: 100%; border-radius: 6px; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- محتوى الصفحات -->
    <div id="page-support" class="page hidden">
        <h3>الدعم الفني 🎧</h3>
        <div id="support-admin-controls"></div>
        <label id="support-select-label" style="font-size: 12px; color: #888;"></label>
        <select id="support-room-selector" onchange="changeSupportActiveRoom(this.value)" style="width: 100%; padding: 8px; margin-bottom: 10px;"></select>
        
        <div id="support-box" style="height: 300px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px;"></div>
        
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <input type="text" id="support-msg-text" placeholder="اكتب رسالتك..." style="flex: 1; padding: 8px;">
            <button onclick="sendSupportMessage()" style="background: var(--gold); color: #000;">إرسال</button>
            <input type="file" id="image-upload" accept="image/*" class="hidden">
            <button onclick="document.getElementById('image-upload').click()" style="background: #444; color: #fff;">📷</button>
        </div>
    </div>

    <div id="page-settings" class="page hidden">
        <h3>الإعدادات ⚙️</h3>
        <input type="text" id="new-username" placeholder="الاسم الجديد" style="width: 100%; padding: 8px; margin-bottom: 5px;">
        <button onclick="updateUsername()" style="background: var(--gold); color: #000; width: 100%;">حفظ الاسم الجديد</button>
        
        <!-- زر قناة الواتساب -->
        <button onclick="window.open('https://whatsapp.com/channel/0029VbD3iZwI1rcbiOIUjn3z', '_blank')" class="btn-whatsapp">
            الانضمام إلى قناتنا على واتس اب 💬
        </button>

        <button onclick="openContactUs()" style="background: #333; color: #fff; width: 100%;">تواصل معنا</button>
    </div>

<script>
    // 🌟 دالة آمنة لمعالجة الإشعارات دون تجميد التطبيق 🌟
    async function initCapacitorNotifications() {
        try {
            if (window.Capacitor && window.Capacitor.isPluginAvailable('PushNotifications')) {
                const PushNotifications = window.Capacitor.Plugins.PushNotifications;

                let permStatus = await PushNotifications.checkPermissions();
                if (permStatus.receive !== 'granted') {
                    permStatus = await PushNotifications.requestPermissions();
                }

                if (permStatus.receive === 'granted') {
                    await PushNotifications.register();
                }

                PushNotifications.addListener('registration', async (token) => {
                    if (typeof myProfile !== 'undefined' && myProfile && myProfile.id) {
                        await _supabase.from('profiles').update({ fcm_token: token.value }).eq('id', myProfile.id);
                    }
                });

                PushNotifications.addListener('pushNotificationReceived', (notification) => {
                    console.log('Notification received: ', notification);
                });
            }
        } catch (e) {
            console.warn('Push Notifications initialization skipped or failed:', e);
        }
    }

    // 🌟 تكييف خيارات الدعم وإظهار الرتب ورسالة الإدارة الجماعية 🌟
    async function loadSupportRoomsSelector() {
        if (typeof _supabase === 'undefined' || typeof myProfile === 'undefined' || !myProfile) return;
        const selector = document.getElementById('support-room-selector');
        const label = document.getElementById('support-select-label');
        const adminControls = document.getElementById('support-admin-controls');
        if(!selector) return;

        const isStaff = ['مشرف', 'مدير', 'مدير مالي'].includes(myProfile.role);

        if (isStaff) {
            if (label) label.innerText = "اختر غرفة العميل/الموظف للرد عليه:";
            
            if (adminControls) {
                adminControls.innerHTML = `
                    <button class="btn-broadcast" onclick="sendBroadcastSupportMessage()">📢 إرسال رسالة جماعية لجميع الموظفين</button>
                `;
            }

            const { data: users } = await _supabase.from('profiles').select('id, username').eq('role', 'موظف');
            
            let unreadRooms = new Set();
            try {
                const { data: unreadData } = await _supabase.from('private_chats').select('room_id, sender_id').eq('is_read', false);
                if (unreadData) {
                    unreadData.forEach(msg => {
                        const rId = String(msg.room_id).trim().toLowerCase();
                        const sId = String(msg.sender_id).trim().toLowerCase();
                        if (sId === rId) unreadRooms.add(rId);
                    });
                }
            } catch (e) {}

            if(users && users.length > 0) {
                const currentSelected = selector.value || activeSupportRoomId || users[0].id;
                selector.innerHTML = users.map(u => {
                    const userIdClean = String(u.id).trim().toLowerCase();
                    const activeRoomClean = typeof activeSupportRoomId !== 'undefined' && activeSupportRoomId ? String(activeSupportRoomId).trim().toLowerCase() : '';
                    const hasUnread = unreadRooms.has(userIdClean) && userIdClean !== activeRoomClean;
                    const dot = hasUnread ? ' 🔴' : '';
                    return `<option value="${u.id}" ${u.id === currentSelected ? 'selected' : ''}>${u.username}${dot}</option>`;
                }).join('');
                
                if(typeof activeSupportRoomId !== 'undefined' && !activeSupportRoomId) { 
                    activeSupportRoomId = currentSelected; 
                    if (typeof markRoomAsRead === 'function') await markRoomAsRead(activeSupportRoomId);
                }
            } else {
                selector.innerHTML = '<option value="">لا يوجد موظفين مسجلين حالياً</option>';
            }
        } else {
            if (adminControls) adminControls.innerHTML = '';
            if (label) label.innerText = "اختر الشخص المسؤول للبدء بالتواصل معه:";
            
            const { data: staffList } = await _supabase
                .from('profiles')
                .select('id, username, role')
                .in('role', ['مشرف', 'مدير', 'مدير مالي']);

            if (staffList && staffList.length > 0) {
                selector.innerHTML = staffList.map(s => {
                    const displayRole = s.role === 'admin' ? 'مشرف' : s.role;
                    return `<option value="${myProfile.id}">${s.username} (${displayRole})</option>`;
                }).join('');
                activeSupportRoomId = myProfile.id;
            } else {
                selector.innerHTML = `<option value="${myProfile.id}">الإدارة العامة (مدير)</option>`;
                activeSupportRoomId = myProfile.id;
            }
        }
    }

    // 🌟 إرسال رسالة دعم جماعية 🌟
    async function sendBroadcastSupportMessage() {
        const text = prompt("اكتب الرسالة الجماعية التي تريد إرسالها لجميع الموظفين في الدعم:");
        if (!text || !text.trim()) return;

        const { data: employees } = await _supabase.from('profiles').select('id').eq('role', 'موظف');
        if (employees && employees.length > 0) {
            const broadcastMessages = employees.map(emp => ({
                sender_id: myProfile.id,
                sender_name: myProfile.username,
                username: myProfile.username,
                message_text: `[رسالة جماعية]: ${text.trim()}`,
                role: myProfile.role,
                room_id: emp.id,
                is_read: false
            }));

            const { error } = await _supabase.from('private_chats').insert(broadcastMessages);
            if (error) alert("خطأ أثناء الإرسال الجماعي: " + error.message);
            else alert("تم إرسال الرسالة الجماعية لجميع الموظفين بنجاح! 🎉");
        }
    }

    // 🌟 تشغيل التطبيق بأمان عند الجاهزية 🌟
    window.addEventListener('load', () => {
        // إزالة الفلاتر المخفية لعرض الواجهة فوراً
        document.querySelectorAll('.page').forEach(el => el.classList.remove('hidden'));
        
        // تشغيل الإشعارات خلف الكواليس دون تعطيل الشاشة
        setTimeout(() => {
            initCapacitorNotifications();
        }, 1000);
    });
</script>
</body>
</html>
