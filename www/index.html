<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Job Syria</title>

    <meta name="theme-color" content="#121212">
    <link rel="icon" type="image/png" href="https://i.ibb.co/23cTDk18/1782795963942.png">

    <!-- CSS والتصميم الخارجي -->
    <link rel="stylesheet" href="style.css">

    <!-- مكتبة Supabase الرسمية -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="auth-section" class="container">
    <h1>JOB SYRIA</h1>
    
    <div id="credentials-inputs">
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button id="submit-auth-btn" onclick="submitAuth()">تسجيل الدخول</button>
        <button class="link-btn" id="toggle-auth-btn" onclick="toggleAuthMode()">ليس لديك حساب؟ أنشئ حساباً جديداً</button>
        <button class="link-btn" onclick="forceClearSession()" style="color:red; font-size:11px; margin-top:15px;">تنظيف الكاش وإعادة التعيين 🔄</button>
    </div>
    
    <div id="username-inputs" class="hidden">
        <p style="text-align:center; font-size:14px; color:#aaa; margin-top:0;">مرحباً بك! يرجى كتابة اسمك المستعار لإتمام حسابك:</p>
        <input type="text" id="username" placeholder="اكتب اسمك الشخصي هنا (مثال: علي)">
        <button onclick="saveUsername()">دخول للتطبيق</button>
    </div>
</div>

<div id="main-section" class="container hidden" style="margin-bottom: 60px; max-width: 500px;">
    <h1 style="font-size: 20px;">JOB SYRIA</h1>
    
    <!-- 1️⃣ شات الدردشة العامة -->
    <div id="page-chat" class="page">
        <div class="emp-count-box">
            👥 عدد الموظفين المتواجدين معنا: <span id="employee-online-count">0</span> موظف
        </div>

        <div id="chat-admin-panel" class="admin-chat-controls hidden">
            <span class="chat-status-text">حالة الدردشة العامة: <span id="chat-status-lbl" style="color: var(--green);">مفتوحة</span></span>
            <button id="toggle-chat-btn" class="btn-toggle-chat" onclick="toggleChatLockState()">قفل الدردشة 🔒</button>
        </div>
        
        <div class="chat-box" id="chat-box"></div>
        <div style="display:flex; gap: 8px;">
            <input type="text" id="msg-text" placeholder="اكتب رسالتك..." style="margin:0;" onfocus="checkChatInputFocus()">
            <button id="send-msg-btn" onclick="sendMessage()" style="width: auto; padding: 0 20px;">إرسال</button>
        </div>
    </div>

    <!-- 2️⃣ شات الدعم الفني والمشرفين -->
    <div id="page-support" class="page hidden">
        <div id="support-rooms-area" style="margin-bottom: 10px;">
            <label id="support-select-label" style="font-size: 11px; color: var(--gold); display: block; margin-bottom: 4px;">اختر الشخص المسؤول للتواصل معه:</label>
            <select id="support-room-selector" onchange="changeSupportActiveRoom(this.value)" style="padding: 6px; margin: 0 0 10px 0; font-size: 12px;"></select>
        </div>

        <div class="chat-box" id="support-box"></div>
        <div style="display:flex; gap: 8px; align-items: center;">
            <input type="file" id="image-upload" accept="image/*" class="hidden">
            <button onclick="document.getElementById('image-upload').click()" style="width: auto; padding: 0 12px; background:#2c2c2c; border: 1px solid #444; color: white;">📷</button>
            <input type="text" id="support-msg-text" placeholder="اكتب رسالتك للدعم..." style="margin:0;">
            <button onclick="sendSupportMessage()" style="width: auto; padding: 0 15px;">إرسال</button>
        </div>
    </div>
    
    <!-- 3️⃣ الإعدادات -->
    <div id="page-settings" class="page hidden">
        <div class="salary-badge">💰 راتبك: <span id="my-salary">0</span> ل.س</div>
        
        <div class="referral-section">
            <div style="margin-bottom: 10px;">👥 عدد إحالاتك الناجحة: <strong id="my-referrals-count" style="color: var(--gold);">0</strong></div>
            <button onclick="copyReferralLink()" style="font-size: 13px; padding: 8px; background-color: #333; color: var(--gold); border: 1px solid var(--gold);">📋 نسخ رابط الإحالة الخاص بي</button>
        </div>

        <div class="cash-section">
            <label for="syriatel-cash-input">اكتب رمز سيريتل كاش الخاص بك</label>
            <input type="text" id="syriatel-cash-input" placeholder="لا تشارك رقمك هنا حفاظاً على خصوصيتك">
            <button onclick="updateSyriatelCash()" style="font-size: 13px; padding: 8px;">حفظ رمز كاش</button>
        </div>

        <input type="text" id="new-username" placeholder="تغيير الاسم">
        <button onclick="updateUsername()">حفظ الاسم الجديد</button>
        
        <a id="contact-mail-link" href="mailto:zakaria728292@gmail.com?subject=تواصل من موظف - Job Syria" style="text-decoration: none;">
            <button class="btn-contact">📧 تواصل معنا</button>
        </a>

        <button onclick="logout()" style="background-color: #8b0000; color: white; margin-top: 30px;">تسجيل الخروج</button>
        
        <div id="monitor">🖥️ شاشة المراقبة: جاهز...</div>
    </div>
    
    <!-- 4️⃣ لوحة التحكم للمسؤول والمدير المالي -->
    <div id="page-admin" class="page hidden">
        <h3>لوحة التحكم الإدارية المالية</h3>
        <div id="employees-list"></div>
    </div>
    
    <!-- الشريط السفلي -->
    <div class="nav-bar">
        <div class="nav-item active" id="nav-chat" onclick="switchPage('chat')">الدردشة</div>
        <div class="nav-item" id="nav-support" onclick="switchPage('support')">
            الدعم <span id="support-badge" class="red-dot hidden"></span>
        </div>
        <div class="nav-item" id="nav-settings" onclick="switchPage('settings')">الإعدادات</div>
        <div class="nav-item hidden" id="nav-admin" onclick="switchPage('admin')">الموظفين</div>
    </div>
</div>

<!-- المحرك والبرمجة الصوتية والمنطقية -->
<script src="app.js"></script>
</body>
</html>
